<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="description" content="Enlaces directos a proyectos y recursos de Camilo Muriel – Mindmapp, Inventario Duma, Portafolio y Contador TCG.">
  <title>Camilo Muriel · Menu</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Helvetica, sans-serif;
      color: #ededed;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* contenedor principal estilo "card" suave */
    .linktree-container {
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
      background: transparent;
      border-radius: 2rem;
      transition: all 0.2s ease;
    }

    /* perfil: avatar + nombre + bio */
    .profile {
      text-align: center;
      margin-bottom: 2rem;
    }

    .avatar {
      width: 88px;
      height: 88px;
      background: #1e1e1e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem auto;
      font-size: 3rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: transform 0.2s;
    }

    .avatar:hover {
      transform: scale(1.02);
    }

    h1 {
      font-size: 1.85rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #f0f0f0, #c0c0c0);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.25rem;
    }

    .bio {
      font-size: 0.9rem;
      color: #a3a3a3;
      margin-top: 0.4rem;
      padding: 0 0.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: inline-block;
      padding-top: 0.65rem;
    }

    /* lista de botones estilo linktree */
    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin: 1.2rem 0 2rem 0;
    }

    /* cada botón grande (enlace) */
    .link-card {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: #151515;
      backdrop-filter: blur(2px);
      border: 1px solid #2a2a2a;
      border-radius: 28px;
      padding: 1rem 1.2rem;
      font-size: 1.2rem;
      font-weight: 500;
      text-decoration: none;
      color: #f0f0f0;
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      text-align: center;
      letter-spacing: 0.2px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      cursor: pointer;
    }

    /* ícono emoji + texto + flecha externa */
    .link-card span:first-child {
      font-size: 1.4rem;
      filter: drop-shadow(0 0 2px rgba(0,0,0,0.4));
    }

    .link-text {
      flex: 1;
      text-align: center;
      font-weight: 500;
    }

    .arrow-icon {
      font-size: 1.1rem;
      opacity: 0.7;
      transition: transform 0.2s, opacity 0.2s;
      margin-left: 0.2rem;
    }

    /* efecto hover + foco (táctil/desktop) */
    .link-card:hover {
      background: #222222;
      border-color: #3e3e3e;
      transform: scale(1.02) translateY(-2px);
      box-shadow: 0 12px 22px -10px rgba(0, 0, 0, 0.6);
    }

    .link-card:hover .arrow-icon {
      opacity: 1;
      transform: translateX(3px);
    }

    .link-card:active {
      transform: scale(0.98);
      transition: 0.05s;
    }

    /* foco accesible */
    .link-card:focus-visible {
      outline: 2px solid #5c9eff;
      outline-offset: 2px;
      background: #2a2a2a;
    }

    /* pie de página sutil */
    footer {
      text-align: center;
      font-size: 0.75rem;
      color: #5e5e5e;
      margin-top: 2rem;
      padding-top: 0.75rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    footer p {
      transition: color 0.2s;
    }

    /* ajustes extra para móviles pequeños */
    @media (max-width: 480px) {
      body {
        padding: 1rem;
      }
      .link-card {
        padding: 0.9rem 1rem;
        font-size: 1rem;
        border-radius: 24px;
      }
      .link-text {
        font-size: 1rem;
      }
      .avatar {
        width: 78px;
        height: 78px;
        font-size: 2.7rem;
      }
      h1 {
        font-size: 1.6rem;
      }
      .bio {
        font-size: 0.8rem;
      }
    }

    /* Landscape / tablets: mantiene legibilidad */
    @media (min-width: 768px) {
      .linktree-container {
        max-width: 580px;
      }
      .link-card {
        padding: 1.1rem 1.5rem;
      }
    }

    /* soporte para gestos táctiles: quitar highlight gris en móviles webkit */
    .link-card {
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <div class="linktree-container">
    <!-- cabecera estilo perfil -->
    <div class="profile">
      <div class="avatar" aria-label="Avatar de perfil">
        🌐
      </div>
      <h1>Camilo Muriel</h1>
      <div class="bio">desarrollador · creador digital</div>
    </div>

    <!-- botones/enlaces principales (linktree) -->
    <div class="links">
      <!-- Mindmapp -->
      <a href="https://camilomurielph.github.io/MindmapApp/" 
         target="_blank" 
         rel="noopener noreferrer" 
         class="link-card">
        <span>🧠</span>
        <span class="link-text">Mindmapp</span>
        <span class="arrow-icon">↗</span>
      </a>

      <!-- Inventario Duma -->
      <a href="https://camilomurielph.github.io/inventarioduma/" 
         target="_blank" 
         rel="noopener noreferrer" 
         class="link-card">
        <span>📦</span>
        <span class="link-text">Inventario Duma</span>
        <span class="arrow-icon">↗</span>
      </a>

      <!-- Portafolio (sitio principal) -->
      <a href="https://camilomurielph.github.io/" 
         target="_blank" 
         rel="noopener noreferrer" 
         class="link-card">
        <span>💼</span>
        <span class="link-text">Portafolio</span>
        <span class="arrow-icon">↗</span>
      </a>

      <!-- Contador TCG (GitHub repo) -->
      <a href="https://github.com/camilomurielph/contadordex" 
         target="_blank" 
         rel="noopener noreferrer" 
         class="link-card">
        <span>🃏</span>
        <span class="link-text">Contador TCG</span>
        <span class="arrow-icon">↗</span>
      </a>
    </div>

    <!-- footer simple, sin distracciones -->
    <footer>
      <p>✦ enlaces directos ✦</p>
    </footer>
  </div>
</body>
</html>
